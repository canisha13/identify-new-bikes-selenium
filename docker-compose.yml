services:
  selenium-hub:
    image: selenium/hub:4.44.0
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    environment:
      SE_SESSION_REQUEST_TIMEOUT: 120
      SE_SESSION_RETRY_INTERVAL: 2
    networks:
      - selenium-network

  chrome:
    image: selenium/node-chrome:4.44.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    ports:
      - "7900:7900"
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 4
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      SE_VNC_NO_PASSWORD: 1
    networks:
      - selenium-network

  firefox:
    image: selenium/node-firefox:4.44.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    ports:
      - "7901:7900"
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 4
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      SE_VNC_NO_PASSWORD: 1
    networks:
      - selenium-network

  edge:
    image: selenium/node-edge:4.44.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    ports:
      - "7902:7900"
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 4
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      SE_VNC_NO_PASSWORD: 1
    networks:
      - selenium-network

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    image: identify-new-bikes-selenium-tests:1.0
    depends_on:
      - selenium-hub
      - chrome
      - firefox
      - edge
    environment:
      GRID_URL: http://selenium-hub:4444
      USE_GRID: "true"
      BROWSER: ${BROWSER:-chrome}
      BASE_URL: ${BASE_URL:-https://www.zigwheels.com}
      TEST_GROUPS: ${TEST_GROUPS:-}
    volumes:
      - ./target:/app/target
    networks:
      - selenium-network

networks:
  selenium-network:
    driver: bridge

